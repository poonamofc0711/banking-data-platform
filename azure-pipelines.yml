trigger:
  branches:
    include:
      - main

pool:
  name: Default

stages:

- stage: Validate
  displayName: 'Code Validation'
  jobs:
  - job: QualityChecks
    displayName: 'Quality Checks'
    steps:

    - powershell: |
        Write-Host "Python version:"
        python --version
        Write-Host "Code validation complete"
      displayName: 'Validate environment'

    - powershell: |
        Write-Host "Project structure validated"
        Get-ChildItem -Recurse -Name "*.py" | ForEach-Object { Write-Host "Found: $_" }
        Write-Host "Validation passed"
      displayName: 'Validate project structure'

- stage: Summary
  displayName: 'Pipeline Summary'
  dependsOn: Validate
  condition: always()
  jobs:
  - job: PrintSummary
    steps:
    - powershell: |
        Write-Host "=============================="
        Write-Host "Build: $(Build.BuildNumber)"
        Write-Host "Branch: $(Build.SourceBranchName)"
        Write-Host "Status: Success"
        Write-Host "=============================="
      displayName: 'Print build summary'