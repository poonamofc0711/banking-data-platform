trigger:
  branches:
    include:
      - main

pool:
  name: Default

stages:

- stage: Validate
  displayName: 'Code Validation'
  jobs:
  - job: QualityChecks
    displayName: 'Quality Checks'
    steps:

    - powershell: |
        Write-Host "=============================="
        Write-Host "Banking Data Platform"
        Write-Host "Code Validation Step"
        Write-Host "Branch: $(Build.SourceBranchName)"
        Write-Host "Commit: $(Build.SourceVersion)"
        Write-Host "Validation: PASSED"
        Write-Host "=============================="
      displayName: 'Validate project'

- stage: Summary
  displayName: 'Pipeline Summary'
  dependsOn: Validate
  condition: always()
  jobs:
  - job: PrintSummary
    steps:
    - powershell: |
        Write-Host "Build $(Build.BuildNumber) complete"
      displayName: 'Print build summary'