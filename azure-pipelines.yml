trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md
      - docs/*

pool:
  name: Default

stages:

- stage: Validate
  displayName: 'Code Validation'
  jobs:
  - job: QualityChecks
    displayName: 'Quality Checks'
    steps:

    - powershell: |
        python --version
        pip install pyspark==3.4.0 delta-spark==2.4.0 pytest flake8
        Write-Host "All dependencies installed"
      displayName: 'Install dependencies'

    - powershell: |
        flake8 databricks/ --max-line-length=120 --ignore=E501,W503 --exclude=.git,__pycache__
        Write-Host "Code linting passed"
      displayName: 'Lint PySpark code'

    - powershell: |
        Write-Host "No tests yet - skipping"
      displayName: 'Run unit tests'

- stage: Summary
  displayName: 'Pipeline Summary'
  dependsOn: Validate
  condition: always()
  jobs:
  - job: PrintSummary
    steps:
    - powershell: |
        Write-Host "Build complete"
        Write-Host "Branch: $(Build.SourceBranchName)"
      displayName: 'Print build summary'